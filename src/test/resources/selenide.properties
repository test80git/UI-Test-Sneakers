# ===================================================
# Базовые настройки Selenide
# ===================================================

# Базовый URL для тестов (главная страница тестового стенда)
# Варианты для других окружений:
# selenide.baseUrl=http://localhost:8080
# selenide.baseUrl=http://83.166.244.182:8081
selenide.baseUrl=https://sneakerstore.test-api-web.ru

# ===================================================
# Настройки браузера
# ===================================================

# Браузер, который будет использовать Selenide
# Доступные варианты: chrome, firefox, edge, opera, safari
selenide.browser=firefox

# Альтернативные варианты (закомментированы):
# selenide.browser=firefox       # Mozilla Firefox
# selenide.browser=edge          # Microsoft Edge
# selenide.browser=opera         # Opera (требует дополнительной настройки)
# selenide.browser=safari        # Safari (только на macOS)

# Путь к Opera (если используется)
# opera.binary.path=C:\\Users\\misha\\AppData\\Local\\Programs\\Opera

# Размер окна браузера (ширина x высота)
selenide.browserSize=1920x1080

# ===================================================
# Настройки таймаутов
# ===================================================

# Таймаут ожидания элементов (в миллисекундах)
# Сколько ждём появления элемента перед ошибкой
selenide.timeout=5000

# Таймаут загрузки страницы (в миллисекундах)
selenide.pageLoadTimeout=10000

# ===================================================
# Режим отображения браузера
# ===================================================

# Режим отображения браузера:
#   true  - браузер не показывается (фоновый режим, для CI/CD)
#   false - браузер показывается (для отладки и локального запуска)
selenide.headless=false

# ===================================================
# Настройки формирования отчётов
# ===================================================

# Сохранять скриншоты при падении теста
selenide.screenshots=true

# Сохранять HTML-код страницы при падении теста (для анализа)
selenide.savePageSource=true

# Путь к папке с отчётами (скриншоты, source-файлы)
selenide.reportsFolder=build/reports/tests

# ===================================================
# Прочие настройки
# ===================================================

# Запрещает браузеру оставаться открытым после завершения тестов
# false - браузер закрывается автоматически
# true  - браузер остаётся открытым (для отладки)
selenide.holdBrowserOpen=false

# ===================================================
# ВАЖНО: Настройка для решения SSL проблемы
# ===================================================
# Если вы получаете ошибку ERR_SSL_VERSION_OR_CIPHER_MISMATCH,
# эту настройку нужно добавить в коде, а не в properties файле:
#
# В классе BaseSelenideTest в методе @BeforeAll добавьте:
#
# ChromeOptions options = new ChromeOptions();
# options.setCapability(CapabilityType.ACCEPT_INSECURE_CERTS, true);
# Configuration.browserCapabilities = options;
# ===================================================
# Настройки параллельного выполнения тестов JUnit 5
# ===================================================

# Включение параллельного выполнения тестов (глобальный переключатель)
# true - параллельное выполнение разрешено, false - запрещено (все тесты идут последовательно)
junit.jupiter.execution.parallel.enabled=true

# Режим выполнения по умолчанию для методов тестов внутри одного класса
# same_thread - все методы теста внутри одного класса выполняются в одном потоке (последовательно)
# concurrent - методы теста внутри класса выполняются параллельно
junit.jupiter.execution.parallel.mode.default=same_thread

# Режим выполнения по умолчанию для разных тестовых классов
# concurrent - разные тестовые классы могут выполняться параллельно друг с другом
# same_thread - все классы выполняются последовательно
junit.jupiter.execution.parallel.mode.classes.default=concurrent

# ===================================================
# Стратегия определения количества потоков
# ===================================================

# Стратегия конфигурации параллельного пула потоков:
# fixed   - фиксированное количество потоков (задается явно)
# dynamic - динамическое количество (зависит от числа ядер процессора)
# custom  - пользовательская стратегия через кастомный класс
junit.jupiter.execution.parallel.config.strategy=fixed

# Количество параллельных потоков при стратегии "fixed"
# Значение 2 означает, что одновременно будут выполняться не более 2 тестов
junit.jupiter.execution.parallel.config.fixed.parallelism=2

# Максимальный размер пула потоков при стратегии "fixed"
# Ограничивает максимальное количество потоков в пуле (обычно равно parallelism)
junit.jupiter.execution.parallel.config.fixed.max-pool-size=2

# ===================================================
# Настройки динамической стратегии (не используется, т.к. strategy=fixed)
# ===================================================

# Множитель для динамического расчета количества потоков
# Формула: parallelism = (количество ядер CPU) * factor
# Значение 0.5 означает, что будет использоваться половина доступных ядер
# Пример: на 4-ядерном процессоре будет создано 2 потока (4 * 0.5 = 2)
junit.jupiter.execution.parallel.config.dynamic.factor=0.5
